version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    
  
  auth:
    build: ./auth
  
  users:
    build: ./users
  
  orders:
    build: ./orders
  
  db: 
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: webapp